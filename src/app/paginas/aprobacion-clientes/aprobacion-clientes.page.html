<ion-content [fullscreen]="true" class="aprobacion-container">
  
  <div class="header-section">
    <div class="back-button-custom" routerLink="/dashboard-admin">
      <div class="arrow-icon"></div>
    </div>

    <h1>Aprobación</h1>
    <p>Gestionar acceso de nuevos clientes</p>
  </div>

  <div class="list-wrapper">
    <ion-list lines="none" *ngIf="clientes.length > 0; else emptyState">
      
      <ion-item-sliding *ngFor="let cliente of clientes">
        <ion-item class="cliente-item">
          <ion-avatar slot="start">
            <img [src]="cliente.foto_url || 'assets/avatar-placeholder.png'" alt="avatar">
          </ion-avatar>
          <ion-label>
            <h2>{{ cliente.nombre }}</h2>
            <p>{{ cliente.email }}</p>
          </ion-label>
          
          <div slot="end" class="direct-actions">
            <ion-button fill="clear" color="success" (click)="aprobar(cliente)">
              <ion-icon name="checkmark-circle"></ion-icon>
            </ion-button>
            <ion-button fill="clear" color="danger" (click)="confirmarRechazo(cliente)">
              <ion-icon name="close-circle"></ion-icon>
            </ion-button>
          </div>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="success" (click)="aprobar(cliente)">
            <ion-icon name="checkmark-outline" slot="icon-only"></ion-icon>
          </ion-item-option>
          <ion-item-option color="danger" (click)="confirmarRechazo(cliente)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>

    </ion-list>

    <ng-template #emptyState>
      <div class="empty-state">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <p>No hay clientes pendientes de aprobación.</p>
      </div>
    </ng-template>
  </div>
</ion-content>
