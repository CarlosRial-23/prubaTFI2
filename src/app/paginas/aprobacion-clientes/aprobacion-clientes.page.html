<ion-header class="ion-no-border">
  <ion-toolbar color="">
    <ion-title class="titulo-ursula">APROBACIÓN DE CLIENTES</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="contenedor-lista">
    @for (cliente of clientes; track cliente.id) {
      <div class="tarjeta-producto">
        <div class="caja-foto">
          <!-- Usamos el mismo estilo de imagen que el menú -->
          <img [src]="cliente.foto || 'assets/avatar-placeholder.png'" class="img-fit">
        </div>

        <div class="caja-datos">
          <div class="fila-superior">
            <span class="nombre-plato">{{ cliente.nombres | uppercase }}</span>
            <span class="estado-pendiente">PENDIENTE</span>
          </div>
          
          <p class="descripcion-texto">
            <strong>Email:</strong> {{ cliente.correo_electronico }}<br>
            <strong>DNI:</strong> {{ cliente.dni || 'No especificado' }}
          </p>

          <div class="fila-inferior">
            <button class="boton-rechazar" (click)="confirmarRechazo(cliente)">
              RECHAZAR
            </button>
            <button class="boton-pedir" (click)="aprobar(cliente)">
              APROBAR
            </button>
          </div>
        </div>
      </div>
    }

    @if (clientes.length === 0) {
      <div class="sin-resultados">
        <ion-icon name="people-outline"></ion-icon>
        <p>No hay clientes pendientes de aprobación</p>
      </div>
    }
    <div class="espaciador-final"></div>
  </div>
</ion-content>
