<ion-content [fullscreen]="true">
  <div class="viewport-espera">
    
    <div class="header-branding">
      <h1 class="font-elegante">Úrsula</h1>
      <div class="status-indicator">
        <span class="dot pulse"></span>
        SALA DE ESPERA
      </div>
    </div>

    <div class="main-body">
      <div class="welcome-text">
        <h2>Hola, {{ nombreCliente }}.</h2>
        <p>Tu mesa está siendo preparada.</p>
        <p>Mirá lo que prefieren otros clientes hoy:</p>
      </div>

      <div class="chart-card">
        <div class="chart-wrapper">
          <canvas #graficoCanvas></canvas>
        </div>
      </div>
    </div>

    <div class="waiting-footer">
      <div class="custom-loader"></div>
      <p>Esperando la orden del Metre...</p>
      
      <ion-button 
        class="btn-simulacion"
        expand="block" 
        (click)="simularAsignacionMesa()">
        <ion-icon name="flask-outline" slot="start"></ion-icon>
        FORZAR ASIGNACION
      </ion-button>
    </div>

  </div>
</ion-content>
