<ion-content [fullscreen]="true" scroll-y="false">
  <div class="viewport">
    <div class="main-card">
      <div class="hero-image">
        <div class="overlay">
          <h1 class="font-elegante">Bienvenido</h1>
          <p class="sub-elegante">Úrsula App</p>
        </div>
      </div>

      <div class="form-content scrollable-form">
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="input-group">
            <label class="custom-label">CORREO ELECTRÓNICO</label>
            <input
              type="email"
              formControlName="email"
              placeholder="Ingrese su correo electrónico"
              class="input-standard"
            />
            <span class="error-text">{{ getErrorMessage('email') }}</span>
          </div>

          <div class="input-group">
            <label class="custom-label">CONTRASEÑA</label>
            <div class="password-container">
              <input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="••••••••"
                class="input-standard"
              />
              <ion-icon
                [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
                class="password-toggle"
                (click)="togglePassword()"
              >
              </ion-icon>
            </div>
            <span class="error-text">{{ getErrorMessage('password') }}</span>
          </div>

          <div class="button-wrapper">
            <button
              type="submit"
              class="btn-registro"
              [disabled]="loginForm.invalid"
            >
              INICIAR SESIÓN
            </button>
          </div>
        </form>

        <div class="login-redirect">
          <p>
            ¿No tienes cuenta?
            <span class="link-text" (click)="irAlRegistro()">Regístrate</span>
          </p>
          <!-- <p>
            TEST CHAT
            <span class="link-text" (click)="irChat()">Ir pantalla chat</span>
          </p> -->

          <p>
            APROBACIÓN CLIENTES
            <span class="link-text" (click)="irAprobacionClientes()">
              Ir aprobación clientes
            </span>
          </p>

          <p class="dev-access">
            <span class="link-dev" (click)="accesoDirectoMetre()">
              MODO TEST: Dashboard Metre
            </span>
          </p>
        </div>
      </div>
    </div>
  </div>
  <app-acceso-rapido (perfilSeleccionado)="onPerfilSeleccionado($any($event))"></app-acceso-rapido>
</ion-content>
