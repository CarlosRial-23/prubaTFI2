<div class="chat-wrapper">
  
  <div class="chat-header">
    <h3>Mesa {{ numero_mesa }}</h3>
    <p>Consulta al mozo</p>
  </div>

  <div class="chat-messages">
    @for (msj of mensajes(); track $index) {
      @if (msj.usuario === usuarioActual) {
        <div class="chat-message own">
          <p>
            <span class="timestamp">{{ msj.created_at | date:'dd/MM/yyyy HH:mm' }}</span>
            </p>
        </div>
      } @else {
        <div class="chat-message other">
           </div>
      }
    } @empty {
      <div class="no-messages">
        <p>No hay consultas. ¡Escribe un mensaje!</p>
      </div>
    }
  </div>

  <div class="chat-input">
    <input 
      [(ngModel)]="msj" 
      placeholder="Escribe tu consulta..." 
      (keyup.enter)="enviarMensaje()" />
    <button (click)="enviarMensaje()">Enviar</button>
  </div>
</div>
